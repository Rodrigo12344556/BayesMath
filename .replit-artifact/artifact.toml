kind = "web"
previewPath = "/"
title = "BayesMath"
version = "1.0.0"
id = "artifacts/bayesmath"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22984

[services.development]
run = "pnpm --filter @workspace/bayesmath run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bayesmath", "run", "build" ]
publicDir = "artifacts/bayesmath/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22984"
BASE_PATH = "/"
